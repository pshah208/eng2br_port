# ─── Frontend Azure Web App Deployment ────────────────────────────────────────
#
# Required secrets / variables (set in GitHub → Settings → Secrets and variables):
#
#   AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND
#     Download from Azure Portal → App Service → Overview → "Get publish profile"
#
# Required variables (GitHub → Settings → Variables):
#   AZURE_WEBAPP_NAME_FRONTEND   – e.g. eng2br-frontend
#   VITE_ENTRA_AUTHORITY         – e.g. https://<tenant>.ciamlogin.com/<tenant>.onmicrosoft.com
#   VITE_ENTRA_CLIENT_ID         – Azure app registration client ID
#   VITE_ENTRA_REDIRECT_URI      – e.g. https://<frontend>.azurewebsites.net
#   VITE_ENTRA_API_SCOPE         – e.g. api://<api-client-id>/user_impersonation
#   VITE_API_BASE_URL            – e.g. https://<api-app>.azurewebsites.net/api/v1

name: Deploy Frontend to Azure Web App

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.js'
      - 'package*.json'
      - '.github/workflows/frontend-azure.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build
        env:
          VITE_ENTRA_AUTHORITY: ${{ vars.VITE_ENTRA_AUTHORITY }}
          VITE_ENTRA_CLIENT_ID: ${{ vars.VITE_ENTRA_CLIENT_ID }}
          VITE_ENTRA_REDIRECT_URI: ${{ vars.VITE_ENTRA_REDIRECT_URI }}
          VITE_ENTRA_API_SCOPE: ${{ vars.VITE_ENTRA_API_SCOPE }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME_FRONTEND }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND }}
          package: ./dist
